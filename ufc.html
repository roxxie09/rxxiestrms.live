<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roxiestreams - Watch Live Sports, F1, UFC, NFL, TV</title>
    <meta name="description" content="Free PPV UFC, TV, NBA, NFL, and F1 streams">
    <meta name="keywords" content="Roxiestreams, ppv, boxing, dazn, f1, ufc, nba, for, stream, online, free, mrgamingstreams, f1, tv, nfl">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Kanit', sans-serif;
        }
        .navbar-brand {
            color: pink !important;
            font-size: 1.3rem;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar-brand:hover {
            text-decoration: underline;
        }
        .fullplayer {
            display: flex;
            flex-direction: column;
            position: relative;
            height: 80vh;
            margin-top: 50px;
        }
        @media (min-width: 992px) {
            .fullplayer {
                flex-direction: row;
            }
        }
        #playerContainer {
            flex-grow: 1;
            height: 100%;
            background: #111;
        }
        .embedchat {
            width: 100%;
            height: 400px;
            margin-top: 10px;
        }
        @media (min-width: 992px) {
            .embedchat {
                width: 30%;
                height: 100%;
                margin-top: 0;
                margin-left: 10px;
            }
        }
        .embedchat iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .streamchanger {
            position: absolute;
            top: -45px;
            left: 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .streambutton {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .streambutton:hover {
            background: #333;
        }
        .streambutton.active {
            background: pink;
            color: #000;
            border-color: pink;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">RoxieStreams</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link text-white" href="#">March Madness</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Soccer</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">MLB</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">NBA</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">NFL</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">NHL</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Fighting</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Motorsports</a></li>
                </ul>
                <div class="navbar-nav">
                    <a class="nav-link text-secondary" href="https://discord.gg/JhkVmejRmn">Stream Request (Discord)</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid pt-2">
        <div class="fullplayer">
            <div class="streamchanger">
                <button class="streambutton" onclick="showPlayer('clappr', 'https://602.shadow-ran.online/ataide.m3u8')">Stream 1 (FIGHT PASS)</button>
                <button class="streambutton" onclick="showPlayer('clappr', 'https://daffodil.shadow-ran.online/sn.m3u8')">Stream 2 (Sportsnet)</button>
                <button class="streambutton" onclick="showPlayer('clappr', 'https://602.shadow-ran.online/tnt2.m3u8')">Stream 3 (TNT)</button>
                <button class="streambutton" onclick="showPlayer('clappr', 'https://602.shadow-ran.online/para.m3u8')">Stream 4 (PARA)</button>
                <button class="streambutton active" onclick="showPlayer('clappr', 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/cllekigzzn/out/v1/bd3b0c314fff4bb1ab4693358f3cd2d3/cenc.mpd', {'294b5761cefc22d0c6312939e13d8278': '52148f1042d238849f0a7813f1da8a7b'})">Stream 5 (DASH)</button>
            </div>
            <div id="playerContainer"></div>
            <div class="embedchat">
                <iframe src="https://www.youtube.com/live_chat?v=ZS9KXyH7Qjc&amp;embed_domain=roxiestreams.info"></iframe>
            </div>
        </div>
    </div>

    <footer class="container-fluid d-flex flex-column flex-lg-row justify-content-lg-between align-items-center py-4 border-top mt-5 border-secondary">
        <ul class="nav">
            <li class="nav-item"><a href="https://discord.gg/JhkVmejRmn" class="nav-link px-2 text-secondary">Stream Request (Discord)</a></li>
        </ul>
        <p class="mb-0 text-secondary">Roxiestreams © 2024</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var clapprPlayer;

        function showPlayer(playerType, stream, drmConfig) {
            if (playerType === "clappr") {
                if (clapprPlayer) {
                    clapprPlayer.destroy();
                }
                
                var config = {
                    source: stream,
                    parentId: "#playerContainer",
                    height: '100%',
                    width: '100%',
                    autoPlay: true,
                    plugins: [DashShakaPlayback],
                    shakaConfiguration: {
                        drm: {
                            clearKeys: drmConfig || {}
                        }
                    }
                };

                clapprPlayer = new Clappr.Player(config);
            }
            
            // Update active button state
            document.querySelectorAll('.streambutton').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(stream)) {
                    btn.classList.add('active');
                }
            });
        }

        // Initial load
        window.onload = function() {
            showPlayer('clappr', 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/cllekigzzn/out/v1/bd3b0c314fff4bb1ab4693358f3cd2d3/cenc.mpd', {'294b5761cefc22d0c6312939e13d8278': '52148f1042d238849f0a7813f1da8a7b'});
        };

        // Anti-devtool / Context menu
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function (e) {
            if ((e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C'))) ||
                (e.ctrlKey && e.shiftKey && e.key === 'J')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
