<!-- Import map for P2P Media Loader (official pattern) -->
<script type="importmap">
{
  "imports": {
    "p2p-media-loader-core": "https://cdn.jsdelivr.net/npm/p2p-media-loader-core@^1/dist/p2p-media-loader-core.es.min.js",
    "p2p-media-loader-hlsjs": "https://cdn.jsdelivr.net/npm/p2p-media-loader-hlsjs@^1/dist/p2p-media-loader-hlsjs.es.min.js"
  }
}
</script>

<script type="module">
console.log("=== MODULE SCRIPT STARTED ===");

import { HlsJsP2PEngine } from "p2p-media-loader-hlsjs";

let clapprPlayer = null;
let engine = null;

window.showPlayer = function(streamUrl) {
  if (clapprPlayer) {
    clapprPlayer.destroy();
    clapprPlayer = null;
    window.__p2pSetupDone = false;
  }

  engine = new HlsJsP2PEngine({
    core: {
      swarmId: streamUrl
    }
  });

  clapprPlayer = new Clappr.Player({
    source: streamUrl,
    parentId: "#playerContainer",
    width: "100%",
    height: "100%",
    autoPlay: true,
    mute: false,
    playback: {
      hlsjsConfig: {
        ...engine.getConfigForHlsJs(),
        liveSyncDurationCount: 3
      }
    }
  });

  // Listen to multiple events to find which one actually fires
  clapprPlayer.on(Clappr.Events.PLAYER_READY, () => {
    console.log("PLAYER_READY fired");
    runP2PSetup();
  });

  clapprPlayer.on(Clappr.Events.PLAYBACK_PLAY, () => {
    console.log("PLAYBACK_PLAY fired");
    runP2PSetup();
  });

  clapprPlayer.on(Clappr.Events.PLAYBACK_LOADED, () => {
    console.log("PLAYBACK_LOADED fired");
    runP2PSetup();
  });

  function runP2PSetup() {
    if (window.__p2pSetupDone) return;
    window.__p2pSetupDone = true;

    console.log("Clappr ready (via any event)");

    const playback = clapprPlayer?.core?.getCurrentPlayback();
    console.log("Playback object:", playback);

    const hls = playback?._hls;
    console.log("HLS instance:", hls);

    engine.bindHls(() => clapprPlayer?.core?.getCurrentPlayback()?._hls);

    setTimeout(() => {
      const boundHls = clapprPlayer?.core?.getCurrentPlayback()?._hls;
      console.log("Bound HLS instance:", boundHls);
      console.log("P2P engine on HLS:", boundHls?.p2pEngine);

      if (boundHls?.p2pEngine) {
        console.log("P2P engine attached");

        boundHls.p2pEngine.addEventListener("onPeerConnect", (params) => {
          console.log("Peer connected", params);
        });

        boundHls.p2pEngine.addEventListener("onPeerClose", (params) => {
          console.log("Peer disconnected", params);
        });
      } else {
        console.log("No P2P engine found on Clappr HLS instance yet");
      }
    }, 2000);
  }
};

window.addEventListener("load", () => {
  showPlayer("https://603.premiumjh.shop/test3/index.m3u8");
});
</script>
