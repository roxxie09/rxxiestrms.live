name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Update multiview.html
        run: python multi.py

      - name: Commit updated multiview.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add multiview.html
          git diff --staged --quiet || git commit -m "Auto-update multiview.html [skip ci]"
          git push

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEYR }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@185.132.53.186 << 'EOF'
          cd ~/roxxiestrms
          git reset --hard
          git clean -fd
          git pull origin main
          rsync -avz --delete ./ /var/www/html/roxxiestrms/
          systemctl restart nginx
          EOF