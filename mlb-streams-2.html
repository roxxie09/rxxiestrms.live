    <script>
        var clapprPlayer;
        var isCasting = false;

        // Floating Cast Button Handler
        document.getElementById('castBtn').addEventListener('click', function() {
            const btn = this;
            if (window.chrome && chrome.cast && chrome.cast.requestSession) {
                if (isCasting) {
                    // Stop casting
                    chrome.cast.requestSession(() => {
                        btn.innerHTML = '<span class="cast-tooltip">Cast to TV</span>📱';
                        btn.classList.remove('casting');
                        isCasting = false;
                    }, console.error);
                } else {
                    // Start casting
                    chrome.cast.requestSession(
                        () => {
                            btn.innerHTML = '<span class="cast-tooltip">Stop Casting</span>⏹️';
                            btn.classList.add('casting');
                            isCasting = true;
                        },
                        (error) => {
                            console.error('Cast error:', error);
                            alert('No Chromecast found—ensure same WiFi');
                        }
                    );
                }
            } else {
                alert('Use Chrome desktop with Cast pinned (⋮ > More tools > Extensions)');
            }
        });

        function showPlayer(playerType, stream) {
            if (playerType === "clappr") {
                if (clapprPlayer) {
                    clapprPlayer.destroy();
                }

                clapprPlayer = new Clappr.Player({
                    source: stream,
                    parentId: "#playerContainer",
                    height: '100%',
                    width: '100%',
                    autoPlay: true,

                    plugins: [ChromecastPlugin],
                    chromecast: {
                        appId: "9DFB77C0",
                        contentType: "application/x-mpegURL",
                        media: {
                            type: ChromecastPlugin.Movie,
                            title: "RoxieStreams Live Stream",
                            subtitle: "MLB Stream"
                        }
                    }
                });
            }
        }

        window.onload = function() {
            showPlayer('clappr', 'https://602.xn--1000-ugoa0hsb9a0hb.com/mlb2.m3u8');
        };
    </script>
