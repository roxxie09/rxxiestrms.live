<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Live Stream</title>

  <script>
    (function () {
      function def(name, fn) {
        if (!Map.prototype[name]) {
          Object.defineProperty(Map.prototype, name, {
            value: fn, writable: true, configurable: true, enumerable: false
          });
        }
      }
      def('getOrInsert', function (key, d) {
        if (!this.has(key)) this.set(key, d);
        return this.get(key);
      });
      def('getOrInsertComputed', function (key, cb) {
        if (!this.has(key)) this.set(key, cb(key));
        return this.get(key);
      });
    })();
  </script>

  <!-- Shaka -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>

  <!-- Bitmovin -->
  <script src="https://cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #video-container {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
    }
    #video-container, .shaka-video-container, .bitmovinplayer-container {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }

    #bar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      font: 13px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 6px 6px 6px 12px;
      opacity: 0.3;
      transition: opacity 0.2s ease;
      user-select: none;
    }
    #bar:hover { opacity: 1; }
    #bar .label { letter-spacing: 0.02em; }

    .pill-btn {
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      padding: 6px 12px;
      font: inherit;
      font-weight: 600;
      color: #000;
      background: #fff;
    }
    .pill-btn:active { transform: translateY(1px); }
    .pill-btn:focus-visible { outline: 2px solid #7fd4ff; outline-offset: 2px; }

    /* Engine toggle uses an outlined look so it's distinct from Reload */
    #engine-btn {
      color: #fff;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.45);
    }
    #engine-btn .engine-name { font-weight: 700; }

    #status {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      max-width: 90vw;
      text-align: center;
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #ffe6c2;
      background: rgba(120, 60, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 180, 100, 0.3);
      border-radius: 10px;
      padding: 8px 12px;
      display: none;
    }
    #status.show { display: block; }
  </style>
</head>
<body>
  <div id="bar">
    <span class="label">Live</span>
    <button id="engine-btn" class="pill-btn" type="button" title="Switch player engine">
      <span class="engine-name">Shaka</span>
    </button>
    <button id="reload-btn" class="pill-btn" type="button">Reload</button>
  </div>
  <div id="status"></div>

  <div id="video-container"></div>

  <script>
    const CONFIG = {
      manifest: "https://otte-qw.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd",
      clearKeys: {
        "14eeabf30c14b7fbf3008c03099ce011": "17d2ac8dbc5429bd70af3433aa12158d"
      },
      bitmovinKey: "5230e8b3-12c9-412c-9318-93be4d47d7ef"
    };

    const RETRY = {
      baseDelay: 1000,
      backoffFactor: 1.5,
      maxDelay: 15000,
      maxNetworkAttempts: null
    };

    const container = document.getElementById('video-container');
    const statusEl  = document.getElementById('status');
    const reloadBtn = document.getElementById('reload-btn');
    const engineBtn = document.getElementById('engine-btn');
    const engineName = engineBtn.querySelector('.engine-name');

    // 'shaka' | 'bitmovin'
    let engine      = 'shaka';
    let player      = null;   // shaka.Player or bitmovin player, depending on engine
    let video       = null;   // only used by Shaka
    let loading     = false;
    let stopped     = false;
    let attempt     = 0;
    let retryTimer  = null;

    function setStatus(msg) {
      if (!msg) { statusEl.className = ''; statusEl.textContent = ''; return; }
      statusEl.textContent = msg;
      statusEl.className = 'show';
    }

    function updateEngineButton() {
      // Button shows the engine you'll switch TO.
      engineName.textContent = engine === 'shaka' ? 'Bitmovin' : 'Shaka';
    }

    /* ---------------- Shaka ---------------- */

    function describe(err) {
      if (!err) return 'unknown error';
      if (err.code === 1001 && err.data) return 'HTTP ' + err.data[1];
      if (err.category === 1) return 'network error (' + err.code + ')';
      if (err.category === 6) return 'DRM/key error (' + err.code + ')';
      return 'error ' + err.code;
    }
    function isRetriable(err) {
      if (!err) return true;
      return err.category === 1 || err.category === 4;
    }

    async function buildShaka() {
      video = document.createElement('video');
      video.id = 'video';
      video.autoplay = true;
      video.setAttribute('playsinline', '');
      container.appendChild(video);

      player = new shaka.Player();
      await player.attach(video);
      new shaka.ui.Overlay(player, container, video);

      const retryParameters = {
        maxAttempts: 6,
        baseDelay: 800,
        backoffFactor: 1.5,
        fuzzFactor: 0.5,
        timeout: 30000,
        connectionTimeout: 10000,
        stallTimeout: 5000
      };

      player.configure({
        drm: { clearKeys: CONFIG.clearKeys },
        manifest: { retryParameters },
        streaming: {
          retryParameters,
          failureCallback: (error) => {
            console.warn('Streaming failure:', describe(error), error);
            if (isRetriable(error)) {
              setStatus('Stream hiccup (' + describe(error) + ') — recovering…');
              player.retryStreaming();
            }
          }
        }
      });

      player.addEventListener('error', (event) => {
        const err = event.detail;
        console.error('Shaka error:', describe(err), err);
        if (loading || stopped) return;
        if (isRetriable(err)) handleFailure(describe(err), true);
        else setStatus('Stopped: ' + describe(err));
      });
    }

    async function loadShaka() {
      await player.load(CONFIG.manifest, null, 'application/dash+xml');
    }

    /* ---------------- Bitmovin ---------------- */

    function clearKeysAsArray() {
      // Bitmovin wants an array of { kid, key } in hex string format.
      return Object.entries(CONFIG.clearKeys).map(([kid, key]) => ({ kid, key }));
    }

    async function buildBitmovin() {
      const host = document.createElement('div');
      host.id = 'bitmovin-player';
      host.style.width = '100%';
      host.style.height = '100%';
      container.appendChild(host);

      // NOTE: do NOT pass `ui: true` — the bundled bitmovinplayer.js auto-builds
      // the default UI. Passing a boolean here crashes the UI manager.
      player = new bitmovin.player.Player(host, {
        key: CONFIG.bitmovinKey,
        playback: { autoplay: true }
      });

      player.on(bitmovin.player.PlayerEvent.Error, (e) => {
        console.error('Bitmovin error:', e);
        if (loading || stopped) return;
        // 1100–1199 are setup/license errors — these won't fix themselves on
        // retry (wrong key, domain not allowlisted, file:// origin, etc.),
        // so stop and tell the user instead of looping forever.
        const fatal = e.code >= 1100 && e.code < 1200;
        const label = 'bitmovin error ' + e.code + (e.name ? ' (' + e.name + ')' : '');
        handleFailure(label, !fatal);
      });
    }

    async function loadBitmovin() {
      await player.load({
        dash: CONFIG.manifest,
        drm: {
          clearkey: clearKeysAsArray()
        }
      });
    }

    /* ---------------- Shared lifecycle ---------------- */

    async function destroyCurrent() {
      clearTimeout(retryTimer);
      if (player) {
        try {
          if (engine === 'shaka') {
            await player.destroy();
          } else {
            player.destroy();
          }
        } catch (e) {
          console.warn('Destroy failed:', e);
        }
      }
      player = null;
      video = null;
      container.innerHTML = '';
    }

    async function buildPlayer() {
      if (engine === 'shaka') await buildShaka();
      else await buildBitmovin();
    }

    function handleFailure(label, retriable) {
      loading = false;
      if (!retriable) { stopped = true; setStatus('Stopped: ' + label + ' — tap Reload.'); return; }
      attempt++;
      if (RETRY.maxNetworkAttempts && attempt > RETRY.maxNetworkAttempts) {
        stopped = true;
        setStatus('Gave up after ' + (attempt - 1) + ' tries (' + label + '). Tap Reload.');
        return;
      }
      const delay = Math.min(RETRY.baseDelay * Math.pow(RETRY.backoffFactor, attempt - 1), RETRY.maxDelay);
      setStatus('Stream not ready (' + label + ') — retrying in ' + Math.round(delay / 1000) + 's (try ' + attempt + ')…');
      retryTimer = setTimeout(loadStream, delay);
    }

    async function loadStream() {
      if (loading) return;
      if (!CONFIG.manifest) { setStatus('No manifest URL set — fill in CONFIG.manifest.'); return; }
      if (!player) { setStatus('Player not ready.'); return; }
      loading = true;
      clearTimeout(retryTimer);
      try {
        if (engine === 'shaka') await loadShaka();
        else await loadBitmovin();
        attempt = 0;
        stopped = false;
        setStatus(null);   // playing — clear any banner
      } catch (err) {
        console.warn('Load failed:', err);
        const label = engine === 'shaka' ? describe(err) : ('bitmovin load error');
        const retriable = engine === 'shaka' ? isRetriable(err) : true;
        handleFailure(label, retriable);
      } finally {
        loading = false;
      }
    }

    async function switchEngine() {
      const target = engine === 'shaka' ? 'bitmovin' : 'shaka';
      setStatus('Switching to ' + target + '…');
      engineBtn.disabled = true;
      reloadBtn.disabled = true;
      try {
        await destroyCurrent();
        engine = target;
        attempt = 0;
        stopped = false;
        updateEngineButton();
        await buildPlayer();
        await loadStream();
      } catch (e) {
        console.error('Switch failed:', e);
        setStatus('Failed to switch to ' + target + '.');
      } finally {
        engineBtn.disabled = false;
        reloadBtn.disabled = false;
      }
    }

    engineBtn.addEventListener('click', switchEngine);

    reloadBtn.addEventListener('click', () => {
      clearTimeout(retryTimer);
      attempt = 0;
      stopped = false;
      loadStream();
    });

    (async () => {
      updateEngineButton();
      await buildPlayer();
      loadStream();
    })();
  </script>
</body>
</html>
