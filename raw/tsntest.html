<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Live Stream</title>

  <script>
    (function () {
      function def(name, fn) {
        if (!Map.prototype[name]) {
          Object.defineProperty(Map.prototype, name, {
            value: fn, writable: true, configurable: true, enumerable: false
          });
        }
      }
      def('getOrInsert', function (key, d) {
        if (!this.has(key)) this.set(key, d);
        return this.get(key);
      });
      def('getOrInsertComputed', function (key, cb) {
        if (!this.has(key)) this.set(key, cb(key));
        return this.get(key);
      });
    })();
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>

  <script src="https://content.jwplatform.com/libraries/cdpMEW0v.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #shaka-container {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #000;
    }
    #shaka-container video,
    #shaka-container, .shaka-video-container {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }

    #jw-container {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
    }
    #jw-container #jwplayer-div {
      width: 100% !important;
      height: 100% !important;
    }

    #bar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      font: 13px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 6px 6px 6px 12px;
      opacity: 0.3;
      transition: opacity 0.2s ease;
      user-select: none;
    }
    #bar:hover { opacity: 1; }
    #bar .label { letter-spacing: 0.02em; }

    .bar-btn {
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      padding: 6px 12px;
      font: inherit;
      font-weight: 600;
      color: #000;
      background: #fff;
      transition: background 0.15s, color 0.15s;
    }
    .bar-btn:active { transform: translateY(1px); }
    .bar-btn:focus-visible { outline: 2px solid #7fd4ff; outline-offset: 2px; }

    #switch-btn {
      background: #ffe033;
      color: #000;
    }
    #switch-btn:hover { background: #ffd000; }

    #status {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      max-width: 90vw;
      text-align: center;
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #ffe6c2;
      background: rgba(120,60,0,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,180,100,0.3);
      border-radius: 10px;
      padding: 8px 12px;
      display: none;
    }
    #status.show { display: block; }
  </style>
</head>
<body>
  <div id="bar">
    <span class="label" id="player-label">Shaka</span>
    <button id="reload-btn" class="bar-btn" type="button">Reload</button>
    <button id="switch-btn" class="bar-btn" type="button">⇄ JW Player</button>
  </div>

  <div id="status"></div>

  <div id="shaka-container">
    <video id="video" autoplay playsinline></video>
  </div>

  <div id="jw-container">
    <div id="jwplayer-div"></div>
  </div>

  <script>
    const CONFIG = {
      manifest: "https://otte-qw.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd",
      clearKeys: {
        "14eeabf30c14b7fbf3008c03099ce011": "17d2ac8dbc5429bd70af3433aa12158d"
      }
    };

    const RETRY = {
      baseDelay: 1000,
      backoffFactor: 1.5,
      maxDelay: 15000,
      maxNetworkAttempts: null
    };

    const videoEl        = document.getElementById('video');
    const shakaContainer = document.getElementById('shaka-container');
    const jwContainer    = document.getElementById('jw-container');
    const statusEl       = document.getElementById('status');
    const reloadBtn      = document.getElementById('reload-btn');
    const switchBtn      = document.getElementById('switch-btn');
    const playerLabel    = document.getElementById('player-label');

    let activePlayer = 'shaka';
    let shakaPlayer = null;
    let jwInstance = null;

    let loading = false;
    let stopped = false;
    let attempt = 0;
    let retryTimer = null;

    function setStatus(msg) {
      if (!msg) {
        statusEl.className = '';
        statusEl.textContent = '';
        return;
      }
      statusEl.textContent = msg;
      statusEl.className = 'show';
    }

    function describe(err) {
      if (!err) return 'unknown error';
      if (err.code === 1001 && err.data) return 'HTTP ' + err.data[1];
      if (err.category === 1) return 'network error (' + err.code + ')';
      if (err.category === 6) return 'DRM/key error (' + err.code + ')';
      return 'error ' + err.code;
    }

    function isRetriable(err) {
      if (!err) return true;
      return err.category === 1 || err.category === 4;
    }

    async function buildShakaPlayer() {
      shakaPlayer = new shaka.Player();
      await shakaPlayer.attach(videoEl);
      new shaka.ui.Overlay(shakaPlayer, shakaContainer, videoEl);

      const retryParameters = {
        maxAttempts: 6,
        baseDelay: 800,
        backoffFactor: 1.5,
        fuzzFactor: 0.5,
        timeout: 30000,
        connectionTimeout: 10000,
        stallTimeout: 5000
      };

      shakaPlayer.configure({
        drm: { clearKeys: CONFIG.clearKeys },
        manifest: { retryParameters },
        streaming: {
          retryParameters,
          failureCallback: (error) => {
            if (activePlayer !== 'shaka') return;
            console.warn('Shaka streaming failure:', describe(error), error);
            if (isRetriable(error)) {
              setStatus('Stream hiccup (' + describe(error) + ') — recovering…');
              shakaPlayer.retryStreaming();
            }
          }
        }
      });

      shakaPlayer.addEventListener('error', (event) => {
        const err = event.detail;
        console.error('Shaka error:', describe(err), err);
        if (activePlayer !== 'shaka' || loading || stopped) return;
        if (isRetriable(err)) handleShakaFailure(describe(err), true);
        else setStatus('Stopped: ' + describe(err));
      });
    }

    function handleShakaFailure(label, retriable) {
      loading = false;

      if (!retriable) {
        stopped = true;
        setStatus('Stopped: ' + label + ' — tap Reload.');
        return;
      }

      attempt++;
      if (RETRY.maxNetworkAttempts && attempt > RETRY.maxNetworkAttempts) {
        stopped = true;
        setStatus('Gave up after ' + (attempt - 1) + ' tries (' + label + '). Tap Reload.');
        return;
      }

      const delay = Math.min(
        RETRY.baseDelay * Math.pow(RETRY.backoffFactor, attempt - 1),
        RETRY.maxDelay
      );

      setStatus('Stream not ready (' + label + ') — retrying in ' + Math.round(delay / 1000) + 's (try ' + attempt + ')…');
      retryTimer = setTimeout(loadShaka, delay);
    }

    async function loadShaka() {
      if (loading || activePlayer !== 'shaka') return;
      loading = true;
      clearTimeout(retryTimer);

      try {
        await shakaPlayer.load(CONFIG.manifest, null, 'application/dash+xml');
        attempt = 0;
        stopped = false;
        setStatus(null);
      } catch (err) {
        console.warn('Shaka load failed:', describe(err), err);
        handleFailure(describe(err), isRetriable(err));
      } finally {
        loading = false;
      }
    }

    function loadJW() {
      if (activePlayer !== 'jw') return;
      setStatus(null);

      const drmKeys = Object.entries(CONFIG.clearKeys).map(([keyId, key]) => ({ keyId, key }));

      try {
        if (jwInstance) {
          jwInstance.load([{
            file: CONFIG.manifest,
            type: 'application/dash+xml',
            drm: {
              clearkey: {
                decryptionKeys: drmKeys
              }
            }
          }]);
          jwInstance.play();
          return;
        }

        jwInstance = jwplayer('jwplayer-div').setup({
          autostart: true,
          controls: true,
          width: '100%',
          height: '100%',
          sources: [{
            file: CONFIG.manifest,
            type: 'application/dash+xml',
            drm: {
              clearkey: {
                decryptionKeys: drmKeys
              }
            }
          }]
        });

        jwInstance.on('setupError', function(e) {
          console.error('JW setupError:', e.message, e);
          setStatus('JW setup error: ' + (e.message || 'unknown') + ' — tap Reload.');
        });

        jwInstance.on('error', function(e) {
          console.error('JW error:', e.message, e.code, e);
          if (activePlayer === 'jw') {
            setStatus('JW error: ' + (e.message || 'unknown') + ' — tap Reload.');
          }
        });

        jwInstance.on('warning', function(e) {
          console.warn('JW warning:', e.message, e);
        });

        jwInstance.on('providerChanged', function(e) {
          console.log('JW provider loaded:', e.provider);
        });

        jwInstance.on('levels', function(e) {
          console.log('JW quality levels received:', e.levels);
        });

        jwInstance.on('bufferChange', function(e) {
          console.log('JW buffer:', e.bufferPercent + '%');
        });

        jwInstance.on('firstFrame', function() {
          console.log('JW first frame rendered ✓');
          setStatus(null);
        });

        jwInstance.on('ready', function() {
          console.log('JW ready ✓');
        });
      } catch (e) {
        console.error('JW setup exception:', e);
        setStatus('JW Player failed to initialise: ' + e.message);
      }
    }

    function switchToJW() {
      if (activePlayer === 'jw') return;

      activePlayer = 'jw';
      clearTimeout(retryTimer);
      loading = false;

      if (shakaPlayer) shakaPlayer.unload();
      videoEl.pause();

      shakaContainer.style.display = 'none';
      jwContainer.style.display = 'block';

      playerLabel.textContent = 'JW Player';
      switchBtn.textContent = '⇄ Shaka';

      setStatus(null);
      loadJW();
    }

    function switchToShaka() {
      if (activePlayer === 'shaka') return;

      activePlayer = 'shaka';

      if (jwInstance) {
        try { jwInstance.stop(); } catch (e) {}
      }

      jwContainer.style.display = 'none';
      shakaContainer.style.display = 'block';

      playerLabel.textContent = 'Shaka';
      switchBtn.textContent = '⇄ JW Player';

      attempt = 0;
      stopped = false;
      setStatus(null);
      loadShaka();
    }

    reloadBtn.addEventListener('click', () => {
      clearTimeout(retryTimer);
      attempt = 0;
      stopped = false;

      if (activePlayer === 'shaka') loadShaka();
      else loadJW();
    });

    switchBtn.addEventListener('click', () => {
      if (activePlayer === 'shaka') switchToJW();
      else switchToShaka();
    });

    (async () => {
      await buildShakaPlayer();
      loadShaka();
    })();
  </script>
</body>
</html>
