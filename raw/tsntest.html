<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Live Stream</title>

  <!-- Map polyfill (kept from your original) -->
  <script>
    (function () {
      function def(name, fn) {
        if (!Map.prototype[name]) {
          Object.defineProperty(Map.prototype, name, {
            value: fn, writable: true, configurable: true, enumerable: false
          });
        }
      }
      def('getOrInsert', function (key, d) {
        if (!this.has(key)) this.set(key, d);
        return this.get(key);
      });
      def('getOrInsertComputed', function (key, cb) {
        if (!this.has(key)) this.set(key, cb(key));
        return this.get(key);
      });
    })();
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #video-container {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
    }
    #video-container, .shaka-video-container {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }

    /* Reload control — quiet, top-center, above the player UI */
    #bar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      font: 13px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 6px 6px 6px 12px;
      opacity: 0.3;
      transition: opacity 0.2s ease;
      user-select: none;
    }
    #bar:hover { opacity: 1; }
    #reload-btn {
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      padding: 6px 12px;
      font: inherit;
      font-weight: 600;
      color: #000;
      background: #fff;
    }
    #reload-btn:active { transform: translateY(1px); }
    #reload-btn:focus-visible { outline: 2px solid #7fd4ff; outline-offset: 2px; }

    #status {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      max-width: 90vw;
      text-align: center;
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #ffe6c2;
      background: rgba(120, 60, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 180, 100, 0.3);
      border-radius: 10px;
      padding: 8px 12px;
      display: none;
    }
    #status.show { display: block; }
  </style>
</head>
<body>
  <div id="bar">
    <span class="label">Live</span>
    <button id="reload-btn" type="button">Reload</button>
  </div>
  <div id="status"></div>

  <div id="video-container">
    <video id="video" autoplay playsinline></video>
  </div>

  <script>
    /* =========================================================
       Fill these in. clearKeys: hex KeyID -> hex Key.
       ========================================================= */
    const CONFIG = {
      manifest: "https://otte-qw.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd",          // your .mpd URL
      clearKeys: {
        "14eeabf30c14b7fbf3008c03099ce011": "17d2ac8dbc5429bd70af3433aa12158d"               // "hexKeyId": "hexKey"
      }
    };

    /* How hard to keep trying when the manifest 400s before it's ready. */
    const RETRY = {
      baseDelay: 1000,       // first wait, ms
      backoffFactor: 1.5,    // each retry waits longer
      maxDelay: 15000,       // ...but never longer than this
      // null = retry forever (good for a live edge that's just "not up yet").
      // Set a number if you'd rather give up after N tries.
      maxNetworkAttempts: null
    };

    const video     = document.getElementById('video');
    const container = document.getElementById('video-container');
    const statusEl  = document.getElementById('status');
    const reloadBtn = document.getElementById('reload-btn');

    let player      = null;
    let loading     = false;   // a load() is in flight
    let stopped     = false;   // hit a non-retriable error; stop looping
    let attempt     = 0;       // consecutive failed attempts
    let retryTimer  = null;

    function setStatus(msg) {
      if (!msg) { statusEl.className = ''; statusEl.textContent = ''; return; }
      statusEl.textContent = msg;
      statusEl.className = 'show';
    }

    // Turn a Shaka error into something readable.
    function describe(err) {
      if (!err) return 'unknown error';
      if (err.code === 1001 && err.data) return 'HTTP ' + err.data[1]; // BAD_HTTP_STATUS
      if (err.category === 1) return 'network error (' + err.code + ')';
      if (err.category === 6) return 'DRM/key error (' + err.code + ')';
      return 'error ' + err.code;
    }

    // Retry network (1) and manifest (4) problems — that's what a flaky 400 edge is.
    // DRM (6), media (3), etc. are not transient, so don't loop forever on them.
    function isRetriable(err) {
      if (!err) return true;
      return err.category === 1 || err.category === 4;
    }

    async function buildPlayer() {
      player = new shaka.Player();
      await player.attach(video);
      new shaka.ui.Overlay(player, container, video);

      // Generous retry params so a single load() rides out transient 400s,
      // and live segment hiccups recover instead of killing playback.
      const retryParameters = {
        maxAttempts: 6,
        baseDelay: 800,
        backoffFactor: 1.5,
        fuzzFactor: 0.5,
        timeout: 30000,
        connectionTimeout: 10000,
        stallTimeout: 5000
      };

      player.configure({
        drm: { clearKeys: CONFIG.clearKeys },
        manifest: { retryParameters },
        streaming: {
          retryParameters,
          // Live recovery: on a streaming failure, retry in place rather than
          // tearing the whole player down.
          failureCallback: (error) => {
            console.warn('Streaming failure:', describe(error), error);
            if (isRetriable(error)) {
              setStatus('Stream hiccup (' + describe(error) + ') — recovering…');
              player.retryStreaming();
            }
          }
        }
      });

      // Runtime errors (after the manifest first loaded).
      player.addEventListener('error', (event) => {
        const err = event.detail;
        console.error('Shaka error:', describe(err), err);
        if (loading || stopped) return;          // load() path handles its own errors
        if (isRetriable(err)) scheduleReload(err); // e.g. live manifest update 400s
        else setStatus('Stopped: ' + describe(err));
      });
    }

    function scheduleReload(err) {
      clearTimeout(retryTimer);
      attempt++;
      if (RETRY.maxNetworkAttempts && attempt > RETRY.maxNetworkAttempts) {
        setStatus('Gave up after ' + (attempt - 1) + ' tries (' + describe(err) + '). Tap Reload to try again.');
        stopped = true;
        return;
      }
      const delay = Math.min(RETRY.baseDelay * Math.pow(RETRY.backoffFactor, attempt - 1), RETRY.maxDelay);
      setStatus('Stream not ready (' + describe(err) + ') — retrying in ' + Math.round(delay / 1000) + 's (try ' + attempt + ')…');
      retryTimer = setTimeout(loadStream, delay);
    }

    async function loadStream() {
      if (loading) return;
      if (!CONFIG.manifest) { setStatus('No manifest URL set — fill in CONFIG.manifest.'); return; }
      loading = true;
      clearTimeout(retryTimer);
      try {
        await player.load(CONFIG.manifest, null, 'application/dash+xml');
        attempt = 0;
        stopped = false;
        setStatus(null); // playing — clear any banner
      } catch (err) {
        console.warn('Load failed:', describe(err), err);
        if (isRetriable(err)) {
          loading = false;
          scheduleReload(err);
          return;
        }
        stopped = true;
        setStatus('Stopped: ' + describe(err) + ' (not retriable — check keys/URL). Tap Reload to retry.');
      } finally {
        loading = false;
      }
    }

    reloadBtn.addEventListener('click', () => {
      clearTimeout(retryTimer);
      attempt = 0;
      stopped = false;
      loadStream();
    });

    /* ---------------- Boot ---------------- */
    (async () => {
      await buildPlayer();
      loadStream();
    })();
  </script>
</body>
</html>
