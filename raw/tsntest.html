<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Live Stream</title>

  <!-- Map polyfill (kept from your original) -->
  <script>
    (function () {
      function def(name, fn) {
        if (!Map.prototype[name]) {
          Object.defineProperty(Map.prototype, name, {
            value: fn, writable: true, configurable: true, enumerable: false
          });
        }
      }
      def('getOrInsert', function (key, d) {
        if (!this.has(key)) this.set(key, d);
        return this.get(key);
      });
      def('getOrInsertComputed', function (key, cb) {
        if (!this.has(key)) this.set(key, cb(key));
        return this.get(key);
      });
    })();
  </script>

  <!-- Primary engine: Shaka -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>
  <!-- Fallback engine: dash.js -->
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #video-container {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
    }
    #video-container, .shaka-video-container {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }

    #bar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      font: 13px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 6px 6px 6px 12px;
      opacity: 0.3;
      transition: opacity 0.2s ease;
      user-select: none;
    }
    #bar:hover { opacity: 1; }
    #engine-badge { letter-spacing: 0.02em; }
    #engine-badge .eng { color: #7fd4ff; font-weight: 600; }
    #reload-btn, #unmute-btn {
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      padding: 6px 12px;
      font: inherit;
      font-weight: 600;
      color: #000;
      background: #fff;
    }
    #unmute-btn { background: #7fd4ff; }
    #reload-btn:active, #unmute-btn:active { transform: translateY(1px); }
    #reload-btn:focus-visible, #unmute-btn:focus-visible { outline: 2px solid #7fd4ff; outline-offset: 2px; }

    #status {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      max-width: 90vw;
      text-align: center;
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #ffe6c2;
      background: rgba(120, 60, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 180, 100, 0.3);
      border-radius: 10px;
      padding: 8px 12px;
      display: none;
    }
    #status.show { display: block; }
  </style>
</head>
<body>
  <div id="bar">
    <span id="engine-badge">Live · <span class="eng" id="eng-name">Shaka</span></span>
    <button id="unmute-btn" type="button">🔊 Unmute</button>
    <button id="reload-btn" type="button">Reload</button>
  </div>
  <div id="status"></div>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <script>
    /* =========================================================
       Fill these in. clearKeys: hex KeyID -> hex Key.
       ========================================================= */
    const CONFIG = {
      manifest: "https://otte-qw.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd",          // your .mpd URL
      clearKeys: {
        "14eeabf30c14b7fbf3008c03099ce011": "17d2ac8dbc5429bd70af3433aa12158d"               // "hexKeyId": "hexKey"
      }
    };

    const RETRY = {
      baseDelay: 1000,        // first wait, ms
      backoffFactor: 1.5,     // each retry waits longer
      maxDelay: 15000,        // cap
      fallbackAfter: 2,       // Shaka tries this many times, then hands off to dash.js
      maxNetworkAttempts: null, // null = retry the active engine forever
      dashWatchdog: 12000     // if dash.js neither plays nor errors in this long, treat as failure
    };

    const video     = document.getElementById('video');
    const container = document.getElementById('video-container');
    const statusEl  = document.getElementById('status');
    const reloadBtn = document.getElementById('reload-btn');
    const unmuteBtn = document.getElementById('unmute-btn');
    const engNameEl = document.getElementById('eng-name');

    let engine      = 'shaka';  // 'shaka' | 'dash'
    let shakaPlayer = null;
    let shakaUI     = null;
    let dashPlayer  = null;
    let dashWatch   = null;
    let loading     = false;    // a Shaka load() is in flight
    let stopped     = false;
    let attempt     = 0;        // consecutive failures on the active engine
    let retryTimer  = null;

    function setStatus(msg) {
      if (!msg) { statusEl.className = ''; statusEl.textContent = ''; return; }
      statusEl.textContent = msg;
      statusEl.className = 'show';
    }
    function engineLabel() { return engine === 'shaka' ? 'Shaka' : 'dash.js'; }
    function updateBadge()  { engNameEl.textContent = engineLabel(); }

    function updateMuteBtn() { unmuteBtn.style.display = video.muted ? '' : 'none'; }

    // Kick off playback. Autoplay-with-sound is blocked until a user gesture,
    // so if play() is rejected we mute (muted autoplay is always allowed) and
    // surface the Unmute button.
    async function tryPlay() {
      try {
        await video.play();
      } catch (e) {
        video.muted = true;
        updateMuteBtn();
        try { await video.play(); } catch (e2) { /* still blocked; native controls remain */ }
      }
      updateMuteBtn();
    }

    // hex -> base64url (no padding) for dash.js ClearKey
    function hexToB64Url(hex) {
      hex = (hex || '').replace(/^0x/, '').trim();
      if (!hex) return '';
      const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(h => parseInt(h, 16)));
      let s = '';
      for (const b of bytes) s += String.fromCharCode(b);
      return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function describe(err) {
      if (!err) return 'unknown error';
      if (err.code === 1001 && err.data) return 'HTTP ' + err.data[1];
      if (err.category === 1) return 'network error (' + err.code + ')';
      if (err.category === 6) return 'DRM/key error (' + err.code + ')';
      return 'error ' + err.code;
    }
    // Retry network (1) and manifest (4); don't loop forever on DRM/media errors.
    function isRetriable(err) {
      if (!err) return true;
      return err.category === 1 || err.category === 4;
    }

    /* ---------------- Shaka ---------------- */
    async function buildShaka() {
      shakaPlayer = new shaka.Player();
      await shakaPlayer.attach(video);
      shakaUI = new shaka.ui.Overlay(shakaPlayer, container, video);

      const retryParameters = {
        maxAttempts: 4, baseDelay: 800, backoffFactor: 1.5,
        fuzzFactor: 0.5, timeout: 30000, connectionTimeout: 10000, stallTimeout: 5000
      };
      shakaPlayer.configure({
        drm: { clearKeys: CONFIG.clearKeys },
        manifest: { retryParameters },
        streaming: {
          retryParameters,
          failureCallback: (error) => {
            console.warn('Shaka streaming failure:', describe(error), error);
            if (isRetriable(error)) { setStatus('Stream hiccup — recovering…'); shakaPlayer.retryStreaming(); }
          }
        }
      });

      shakaPlayer.addEventListener('error', (event) => {
        const err = event.detail;
        console.error('Shaka error:', describe(err), err);
        if (loading || stopped || engine !== 'shaka') return;
        handleFailure(describe(err), isRetriable(err));
      });
    }
    async function destroyShaka() {
      try { if (shakaUI) await shakaUI.destroy(); } catch (e) {}
      try { if (shakaPlayer) await shakaPlayer.destroy(); } catch (e) {}
      shakaUI = null; shakaPlayer = null;
    }

    /* ---------------- dash.js ---------------- */
    function startDash() {
      destroyDash();
      dashPlayer = dashjs.MediaPlayer().create();

      // Throttle dash.js's own retries: a few polite attempts, well spaced.
      // Without this it fires a burst of parallel requests that makes the
      // server's 400s worse (the "more requests = more 400s" effect).
      dashPlayer.updateSettings({
        streaming: {
          retryAttempts:  { MPD: 2, MediaSegment: 2, InitializationSegment: 2 },
          retryIntervals: { MPD: 2000, MediaSegment: 2000, InitializationSegment: 2000 }
        }
      });

      const clearkeys = {};
      for (const kid in CONFIG.clearKeys) {
        if (!kid) continue;
        clearkeys[hexToB64Url(kid)] = hexToB64Url(CONFIG.clearKeys[kid]);
      }
      dashPlayer.setProtectionData({ 'org.w3.clearkey': { clearkeys } });

      dashPlayer.on(dashjs.MediaPlayer.events.ERROR, onDashError);
      dashPlayer.on(dashjs.MediaPlayer.events.CAN_PLAY, onDashPlaying);
      dashPlayer.on(dashjs.MediaPlayer.events.PLAYBACK_STARTED, onDashPlaying);

      video.controls = true; // dash.js has no built-in controls
      dashPlayer.initialize(video, CONFIG.manifest, true);

      clearTimeout(dashWatch);
      dashWatch = setTimeout(() => {
        if (engine === 'dash') onDashError({ watchdog: true });
      }, RETRY.dashWatchdog);
    }
    function destroyDash() {
      clearTimeout(dashWatch);
      try { if (dashPlayer) dashPlayer.reset(); } catch (e) {}
      dashPlayer = null;
    }
    function onDashPlaying() {
      if (engine !== 'dash') return;
      clearTimeout(dashWatch);
      onPlaying();
      tryPlay();   // dash.js has no UI, so make sure it actually starts
    }
    function onDashError(e) {
      if (engine !== 'dash') return;
      clearTimeout(dashWatch);
      console.warn('dash.js error:', e);
      handleFailure(e && e.watchdog ? 'timed out' : 'dash error', true);
    }

    /* ---------------- Shared flow ---------------- */
    function onPlaying() {
      attempt = 0; stopped = false; setStatus(null); updateBadge();
    }

    function handleFailure(label, retriable) {
      loading = false;
      if (!retriable) { stopped = true; setStatus('Stopped: ' + label + ' — tap Reload.'); return; }
      attempt++;

      // Primary -> fallback handoff
      if (engine === 'shaka' && attempt >= RETRY.fallbackAfter) {
        setStatus('Shaka failed ' + attempt + '× (' + label + ') — switching to dash.js…');
        switchEngine('dash');
        return;
      }
      if (RETRY.maxNetworkAttempts && attempt > RETRY.maxNetworkAttempts) {
        stopped = true;
        setStatus('Gave up after ' + (attempt - 1) + ' tries (' + label + '). Tap Reload.');
        return;
      }
      const delay = Math.min(RETRY.baseDelay * Math.pow(RETRY.backoffFactor, attempt - 1), RETRY.maxDelay);
      setStatus(engineLabel() + ' not ready (' + label + ') — retrying in ' + Math.round(delay / 1000) + 's (try ' + attempt + ')…');
      retryTimer = setTimeout(loadStream, delay);
    }

    async function switchEngine(target) {
      clearTimeout(retryTimer);
      if (engine === 'shaka') await destroyShaka(); else destroyDash();
      engine = target;
      attempt = 0;
      stopped = false;
      if (target === 'shaka') { video.controls = false; await buildShaka(); }
      updateBadge();
      loadStream();
    }

    async function loadStream() {
      if (loading) return;
      if (!CONFIG.manifest) { setStatus('No manifest URL set — fill in CONFIG.manifest.'); return; }
      clearTimeout(retryTimer);

      if (engine === 'shaka') {
        loading = true;
        try {
          await shakaPlayer.load(CONFIG.manifest, null, 'application/dash+xml');
          onPlaying();
          tryPlay();
        } catch (err) {
          console.warn('Shaka load failed:', describe(err), err);
          handleFailure(describe(err), isRetriable(err));
        } finally {
          loading = false;
        }
      } else {
        startDash(); // event-driven; success/failure come via dash listeners
      }
    }

    // Reload always resets to the primary engine (Shaka) and clears backoff.
    reloadBtn.addEventListener('click', async () => {
      clearTimeout(retryTimer);
      attempt = 0; stopped = false;
      if (engine !== 'shaka') { await switchEngine('shaka'); }
      else { loadStream(); }
    });

    // Unmute is a user gesture, so sound is allowed after this tap.
    unmuteBtn.addEventListener('click', () => {
      video.muted = false;
      video.play().catch(() => {});
      updateMuteBtn();
    });

    /* ---------------- Boot ---------------- */
    (async () => {
      video.muted = true;     // guarantees autoplay can start
      updateMuteBtn();
      await buildShaka();
      updateBadge();
      loadStream();
    })();
  </script>
</body>
</html>
