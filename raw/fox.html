<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Live Stream</title>

  <!-- Map polyfill kept from your original -->
  <script>
    (function () {
      function def(name, fn) {
        if (!Map.prototype[name]) {
          Object.defineProperty(Map.prototype, name, {
            value: fn, writable: true, configurable: true, enumerable: false
          });
        }
      }
      def('getOrInsert', function (key, d) {
        if (!this.has(key)) this.set(key, d);
        return this.get(key);
      });
      def('getOrInsertComputed', function (key, cb) {
        if (!this.has(key)) this.set(key, cb(key));
        return this.get(key);
      });
    })();
  </script>

  <!-- Shaka -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>

  <!-- JW Player: replace KEY with your cloud-hosted library id.
       Self-hosting? Use jwplayer.js + set jwplayer.key (see notes at bottom). -->
  <script src="https://cdn.jwplayer.com/libraries/YOUR_JW_LIBRARY_KEY.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .stage {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
    }
    [data-shaka-player-container] {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }
    /* JW fills the stage */
    #jw-host, #jw-host .jwplayer {
      width: 100% !important;
      height: 100% !important;
    }

    /* Player toggle */
    #switch-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      padding: 7px 12px;
      font: 600 12px/1 system-ui, sans-serif;
      letter-spacing: .02em;
      color: #fff;
      background: rgba(20, 20, 20, .72);
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 6px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background .15s ease, border-color .15s ease;
    }
    #switch-btn:hover { background: rgba(40, 40, 40, .85); }
    #switch-btn:focus-visible { outline: 2px solid #4da3ff; outline-offset: 2px; }
    #switch-btn[disabled] { opacity: .5; cursor: wait; }
  </style>
</head>
<body>
  <!-- Shaka stage -->
  <div id="shaka-host" class="stage" data-shaka-player-container></div>

  <!-- JW stage (hidden until switched) -->
  <div id="jw-host" class="stage" style="display:none"></div>

  <button id="switch-btn" type="button">Switch to JW Player</button>

  <script>
    /* ---- Fill these in once; both players reuse them ---- */
    const CONFIG = {
      mpd:   "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd",   // your .mpd URL
      keyId: "14eeabf30c14b7fbf3008c03099ce011",   // ClearKey keyId (hex)
      key:   "17d2ac8dbc5429bd70af3433aa12158d"    // ClearKey key   (hex)
    };

    const btn        = document.getElementById('switch-btn');
    const shakaHost  = document.getElementById('shaka-host');
    const jwHost     = document.getElementById('jw-host');

    let shakaPlayer = null;
    let jwInstance  = null;
    let current     = null;   // 'shaka' | 'jw'
    let busy        = false;

    /* Fully release whichever player is active so they never both
       decrypt the stream at the same time. */
    async function teardown() {
      if (shakaPlayer) {
        try { await shakaPlayer.destroy(); } catch (e) {}
        shakaPlayer = null;
      }
      if (jwInstance) {
        try { jwInstance.remove(); } catch (e) {}
        jwInstance = null;
      }
      shakaHost.innerHTML = '';
      jwHost.innerHTML = '';
    }

    async function loadShaka() {
      await teardown();
      jwHost.style.display = 'none';
      shakaHost.style.display = 'block';

      const video = document.createElement('video');
      video.setAttribute('data-shaka-player', '');
      video.autoplay = true;
      video.playsInline = true;
      shakaHost.appendChild(video);

      shakaPlayer = new shaka.Player(video);
      new shaka.ui.Overlay(shakaPlayer, shakaHost, video);

      const clearKeys = {};
      clearKeys[CONFIG.keyId] = CONFIG.key;
      shakaPlayer.configure({ drm: { clearKeys } });

      await shakaPlayer.load(CONFIG.mpd);
      current = 'shaka';
    }

    async function loadJW() {
      await teardown();
      shakaHost.style.display = 'none';
      jwHost.style.display = 'block';

      const mount = document.createElement('div');
      mount.id = 'jw-player';
      jwHost.appendChild(mount);

      jwInstance = jwplayer('jw-player').setup({
        width: '100%',
        height: '100%',
        autostart: true,
        playlist: [{
          sources: [{
            file: CONFIG.mpd,
            type: 'dash',
            drm: {
              clearkey: {
                keyId: CONFIG.keyId,
                key:   CONFIG.key
              }
            }
          }]
        }]
      });
      current = 'jw';
    }

    function refreshBtn() {
      btn.textContent = current === 'shaka' ? 'Switch to JW Player' : 'Switch to Shaka';
    }

    async function switchPlayer() {
      if (busy) return;
      busy = true;
      btn.disabled = true;
      try {
        if (current === 'shaka') await loadJW();
        else await loadShaka();
        refreshBtn();
      } catch (e) {
        console.error('Switch failed:', e);
      } finally {
        busy = false;
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', switchPlayer);

    // Start on Shaka (matches your original setup)
    loadShaka().then(refreshBtn).catch(console.error);
  </script>
</body>
</html>
