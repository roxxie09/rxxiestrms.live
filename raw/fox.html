<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Live Stream</title>
  <script>
    (function () {
      function def(name, fn) {
        if (!Map.prototype[name]) {
          Object.defineProperty(Map.prototype, name, {
            value: fn, writable: true, configurable: true, enumerable: false
          });
        }
      }
      def('getOrInsert', function (key, d) {
        if (!this.has(key)) this.set(key, d);
        return this.get(key);
      });
      def('getOrInsertComputed', function (key, cb) {
        if (!this.has(key)) this.set(key, cb(key));
        return this.get(key);
      });
    })();
  </script>

  <!-- Shaka (default engine) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>

  <!-- JW Player (second engine) - REPLACE YOUR_LIBRARY_ID with your own JW library/license URL.
       This won't play until you add your real JW Player library ID. -->
  <script src="https://content.jwplatform.com/libraries/YOUR_LIBRARY_ID.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #stage { position: fixed; inset: 0; }
    #video-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }
    video { width: 100%; height: 100%; }
    [data-shaka-player-container] {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }

    #changePlayerBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 99999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 6px;
      padding: 6px 10px;
      font: 600 12px/1 system-ui, sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #changePlayerBtn:hover { background: rgba(0,0,0,0.8); }
  </style>
</head>
<body>
  <div id="stage">
    <div id="video-container"></div>
    <button id="changePlayerBtn" type="button">Change Player</button>
  </div>

  <script>
    // Stream + ClearKey credentials (hex). Same values feed both engines.
    const MPD = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd";
    const KEY_ID = "14eeabf30c14b7fbf3008c03099ce011";   // hex key ID
    const KEY = "17d2ac8dbc5429bd70af3433aa12158d";      // hex key

    const ENGINES = ['shaka', 'jwplayer'];
    const LABELS = { shaka: 'Shaka', jwplayer: 'JW Player' };
    let engineIndex = 0;

    let shakaPlayer = null, shakaUI = null, jwInstance = null;

    function container() { return document.getElementById('video-container'); }

    function cleanup() {
      try { if (shakaUI) shakaUI.destroy(); } catch (e) {}
      try { if (shakaPlayer) shakaPlayer.destroy(); } catch (e) {}
      try { if (jwInstance) jwInstance.remove(); } catch (e) {}
      shakaUI = shakaPlayer = jwInstance = null;
      const c = container();
      c.removeAttribute('data-shaka-player-container');
      c.innerHTML = '';
    }

    // --- Shaka: identical config to the original file ---
    async function startShaka() {
      const c = container();
      c.setAttribute('data-shaka-player-container', '');

      const video = document.createElement('video');
      video.id = 'video';
      video.setAttribute('data-shaka-player', '');
      video.autoplay = true;
      video.setAttribute('playsinline', '');
      video.style.cssText = 'width:100%;height:100%';
      c.appendChild(video);

      const player = new shaka.Player(video);
      shakaUI = new shaka.ui.Overlay(player, c, video);
      player.configure({
        drm: {
          clearKeys: { [KEY_ID]: KEY }
        }
      });
      shakaPlayer = player;
      await player.load(MPD);
    }

    // --- JW Player: same MPD + ClearKey, JW's config shape ---
    function startJW() {
      if (typeof jwplayer === 'undefined') {
        console.error('JW Player library not loaded - add your library ID in the <head>.');
        return;
      }
      const c = container();
      const target = document.createElement('div');
      target.id = 'jwplayerDiv';
      target.style.cssText = 'width:100%;height:100%';
      c.appendChild(target);

      jwInstance = jwplayer('jwplayerDiv').setup({
        width: '100%',
        height: '100%',
        autostart: true,
        playlist: [{
          sources: [{
            file: MPD,
            type: 'dash',
            drm: {
              clearkey: { keyId: KEY_ID, key: KEY }
            }
          }]
        }]
      });
    }

    function startEngine(name) {
      cleanup();
      if (name === 'shaka') startShaka().catch(console.error);
      else if (name === 'jwplayer') startJW();

      const btn = document.getElementById('changePlayerBtn');
      if (btn) btn.textContent = 'Change Player (' + LABELS[name] + ')';
    }

    document.getElementById('changePlayerBtn').addEventListener('click', function () {
      engineIndex = (engineIndex + 1) % ENGINES.length;
      startEngine(ENGINES[engineIndex]);
    });

    // Shaka loads first, exactly like the original.
    startEngine(ENGINES[engineIndex]);
  </script>
</body>
</html>
