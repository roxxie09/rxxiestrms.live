<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Live Stream</title>

  <!-- Pre-warm CDN and stream origin connections -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://otte.cache.aiv-cdn.net">
  <link rel="dns-prefetch" href="https://otte.cache.aiv-cdn.net">

  <!-- Pinned stable versions instead of @latest (avoids redirect overhead) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.11.1/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11.1/dist/shaka-player.ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr@0.4.11/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@3.1.1/dist/dash-shaka-playback.min.js"></script>

  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #stage { position: fixed; inset: 0; }
    #playerContainer { width: 100%; height: 100%; position: relative; }
    #playerContainer video,
    [data-shaka-player-container] { width: 100% !important; height: 100% !important; background: #000; }

    #changePlayerBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 99999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 6px;
      padding: 6px 10px;
      font: 600 12px/1 system-ui, sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #changePlayerBtn:hover { background: rgba(0,0,0,0.8); }
  </style>
</head>
<body>
  <div id="stage">
    <div id="playerContainer"></div>
    <button id="changePlayerBtn" type="button">Change Player</button>
  </div>

  <script>
    const MPD = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/3gg2jnixjn/out/v1/e1840e01f3f14563b66bbb944d5cc54c/cenc.mpd";
    const CLEAR_KEYS = { "f8b207c10f3f76aeba32a360ec52b9e4": "afad49d20eb39670e93e371c1d669921" };

    // Shaka is now first — faster/more reliable for DASH+ClearKey
    const ENGINES = ['shaka', 'clappr'];
    const LABELS = { shaka: 'Shaka', clappr: 'Clappr' };
    let engineIndex = 0;

    let shakaPlayer = null, shakaUI = null, clapprPlayer = null;

    function container() { return document.getElementById('playerContainer'); }

    function cleanup() {
      try { if (shakaUI) shakaUI.destroy(); } catch (e) {}
      try { if (shakaPlayer) shakaPlayer.destroy(); } catch (e) {}
      try { if (clapprPlayer) clapprPlayer.destroy(); } catch (e) {}
      shakaUI = shakaPlayer = clapprPlayer = null;
      container().innerHTML = '';
    }

    async function startShaka() {
      const wrap = document.createElement('div');
      wrap.setAttribute('data-shaka-player-container', '');
      wrap.style.cssText = 'width:100%;height:100%';

      const video = document.createElement('video');
      video.setAttribute('data-shaka-player', '');
      video.autoplay = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('preload', 'none'); // prevent double-fetch
      video.style.cssText = 'width:100%;height:100%';

      wrap.appendChild(video);
      container().appendChild(wrap);

      const player = new shaka.Player(video);
      new shaka.ui.Overlay(player, wrap, video);

      player.configure({
        drm: { clearKeys: CLEAR_KEYS },
        // Start at lower quality for faster initial buffer, then ramp up
        abr: {
          enabled: true,
          defaultBandwidthEstimate: 1000000, // start assuming 1 Mbps
          switchInterval: 8
        },
        streaming: {
          bufferingGoal: 10,        // only buffer 10s ahead (was default 30s)
          rebufferingGoal: 1.5,     // resume playback sooner after stall
          bufferBehind: 15          // keep less behind-buffer to save memory
        }
      });

      shakaPlayer = player;
      shakaUI = new shaka.ui.Overlay(player, wrap, video);

      await player.load(MPD);
    }

    function startClappr() {
      clapprPlayer = new Clappr.Player({
        source: MPD,
        parentId: '#playerContainer',
        width: '100%',
        height: '100%',
        autoPlay: true,
        playback: {
          playInline: true,
          recycleVideo: true,
          preload: 'none'  // don't preload before play
        },
        plugins: [window.DashShakaPlayback].filter(Boolean),
        shakaConfiguration: {
          drm: { clearKeys: CLEAR_KEYS },
          abr: {
            enabled: true,
            defaultBandwidthEstimate: 1000000,
            switchInterval: 8
          },
          streaming: {
            bufferingGoal: 10,
            rebufferingGoal: 1.5,
            bufferBehind: 15
          }
        }
      });
    }

    function startEngine(name) {
      cleanup();
      if (name === 'shaka') startShaka().catch(console.error);
      else if (name === 'clappr') startClappr();

      const btn = document.getElementById('changePlayerBtn');
      if (btn) btn.textContent = 'Change Player (' + LABELS[name] + ')';
    }

    document.getElementById('changePlayerBtn').addEventListener('click', function () {
      engineIndex = (engineIndex + 1) % ENGINES.length;
      startEngine(ENGINES[engineIndex]);
    });

    startEngine(ENGINES[engineIndex]);
  </script>
</body>
</html>
