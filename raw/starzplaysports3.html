<!DOCTYPE html>
<html lang="en">
<head>

  <title>Starzplay Sports 3 Direct Node</title>
  <script>
    (function () {
      function def(name, fn) {
        if (!Map.prototype[name]) {
          Object.defineProperty(Map.prototype, name, {
            value: fn, writable: true, configurable: true, enumerable: false
          });
        }
      }
      def('getOrInsert', function (key, d) {
        if (!this.has(key)) this.set(key, d);
        return this.get(key);
      });
      def('getOrInsertComputed', function (key, cb) {
        if (!this.has(key)) this.set(key, cb(key));
        return this.get(key);
      });
    })();
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #video-container {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
    }
    [data-shaka-player-container] {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="video-container" data-shaka-player-container>
    <video id="video" data-shaka-player autoplay playsinline></video>
  </div>
  <script>
    async function init() {
      const video = document.getElementById('video');
      const container = document.getElementById('video-container');
      const player = new shaka.Player(video);
      const ui = new shaka.ui.Overlay(player, container, video);
      
      // Active ClearKey decryption block for Sports 3
      player.configure({
        drm: {
          clearKeys: {
            "117c29396ec6fd295880013241a466e1": "3dfb883251884e66d784111877c44b13"
          }
        }
      });
      
      // Target live stream link
      await player.load("https://sps3.starzplayarabia.com/out/v1/95528122fa434bcd948c9ed2e7afabee/index.mpd?ck=eyIxMTdjMjkzOTZlYzZmZDI5NTg4MDAxMzI0MWE0NjZlMSI6IjNkZmI4ODMyNTE4ODRlNjZkNzg0MTExODc3YzQ0YjEzIn0%3D");
    }
    init().catch(console.error);
  </script>
</body>
