const SPORT_LABELS = {
    soccer: '⚽ Soccer (WC 2026)', mlb: '⚾ MLB', nba: '🏀 NBA',
    nhl: '🏒 NHL', fighting: '🥊 Fighting', motorsports: '🏎 Motorsports'
};

let domains = {};
let players = {};

const uniqueTxts = [...new Set(STREAMS.filter(s => s.txt).map(s => s.txt))];
Promise.all(uniqueTxts.map(txt =>
    fetch(txt).then(r => r.text()).then(data => {
        domains[txt] = data.trim().split('\n').filter(d => d.trim());
    }).catch(() => { domains[txt] = []; })
));

function getStreamUrl(stream) {
    if (stream.hardcoded) return stream.hardcoded;
    const domainList = domains[stream.txt] || [];
    if (domainList.length === 0) return `https://${stream.subdomain}.shadow-ran.online/${stream.path}`;
    const randomDomain = domainList[Math.floor(Math.random() * domainList.length)];
    return `https://${stream.subdomain}.${randomDomain}/${stream.path}`;
}

function getUrlFromParts(subdomain, path, txt) {
    const domainList = domains[txt] || [];
    if (domainList.length === 0) return `https://${subdomain}.shadow-ran.online/${path}`;
    const randomDomain = domainList[Math.floor(Math.random() * domainList.length)];
    return `https://${subdomain}.${randomDomain}/${path}`;
}

function buildStreamOptions() {
    const groups = {};
    STREAMS.forEach((s, i) => {
        if (!groups[s.sport]) groups[s.sport] = [];
        groups[s.sport].push({ label: s.label, index: i });
    });
    const sportOrder = ['soccer','mlb','nba','nhl','fighting','motorsports'];
    let html = '<option value="">— Select a stream —</option>';
    sportOrder.forEach(sport => {
        if (!groups[sport]) return;
        const label = SPORT_LABELS[sport] || sport.toUpperCase();
        html += `<optgroup label="${label}">`;
        groups[sport].forEach(s => {
            html += `<option value="${s.index}">${s.label}</option>`;
        });
        html += '</optgroup>';
    });
    return html;
}

function setLayout(count) {
    Object.values(players).forEach(p => { try { p.destroy(); } catch(e) {} });
    players = {};
    const grid = document.getElementById('multiGrid');
    grid.className = `grid-${count}`;
    grid.innerHTML = '';
    document.querySelectorAll('.layout-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() == count);
    });
    for (let i = 0; i < count; i++) {
        const panel = document.createElement('div');
        panel.className = 'stream-panel';
        panel.innerHTML = `
            <div class="panel-toolbar">
                <select class="stream-select" id="select-${i}">${buildStreamOptions()}</select>
                <button class="load-btn" onclick="loadStream(${i})">Load</button>
                <button class="src-btn" id="src-btn-${i}" title="Switch source">▾</button>
                <div class="src-menu" id="src-menu-${i}"></div>
            </div>
<div class="panel-player" id="player-${i}"></div>`;
        grid.appendChild(panel);

        document.getElementById(`src-btn-${i}`).addEventListener('click', function(e) {
            e.stopPropagation();
            const menu = document.getElementById(`src-menu-${i}`);
            const isOpen = menu.style.display === 'block';
            document.querySelectorAll('.src-menu').forEach(m => m.style.display = 'none');
            menu.style.display = isOpen ? 'none' : 'block';
        });
    }

    document.addEventListener('click', () => {
        document.querySelectorAll('.src-menu').forEach(m => m.style.display = 'none');
    });
}

function spawnPlayer(panelIndex, url) {
    const container = document.getElementById(`player-${panelIndex}`);
    if (players[panelIndex]) {
        try { players[panelIndex].destroy(); } catch(e) {}
        delete players[panelIndex];
    }
    container.innerHTML = '';

    const playerDiv = document.createElement('div');
    playerDiv.id = `clappr-${panelIndex}`;
    playerDiv.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';
    container.style.position = 'relative';
    container.appendChild(playerDiv);

    players[panelIndex] = new Clappr.Player({
        source: url,
        parentId: `#clappr-${panelIndex}`,
        height: '100%',
        width: '100%',
        autoPlay: true,
        mute: panelIndex !== 0,
        playback: {
            playInline: true,
            recycleVideo: true,
        }
    });

    setTimeout(() => {
        if (players[panelIndex]) {
            players[panelIndex].resize({ width: container.offsetWidth, height: container.offsetHeight });
        }
    }, 400);
}

function loadStream(panelIndex, overrideSubdomain, overridePath, overrideTxt) {
    const select = document.getElementById(`select-${panelIndex}`);
    const streamIndex = select.value;
    if (streamIndex === '') return;

    const stream = STREAMS[streamIndex];
    const url = overridePath
        ? getUrlFromParts(overrideSubdomain, overridePath, overrideTxt)
        : getStreamUrl(stream);

    const srcBtn = document.getElementById(`src-btn-${panelIndex}`);
    const srcMenu = document.getElementById(`src-menu-${panelIndex}`);

    if (!overridePath && stream.alts && stream.alts.length > 0) {
        srcBtn.style.display = 'inline-block';
        let menuHtml = `<button class="active-src" onclick="loadStream(${panelIndex});document.getElementById('src-menu-${panelIndex}').style.display='none'">✔ Default</button>`;
        stream.alts.forEach(alt => {
            menuHtml += `<button onclick="loadStream(${panelIndex},'${alt.subdomain}','${alt.path}','${alt.txt}');document.getElementById('src-menu-${panelIndex}').style.display='none'">${alt.label}</button>`;
        });
        srcMenu.innerHTML = menuHtml;
    } else if (!overridePath) {
        srcBtn.style.display = 'none';
        srcMenu.innerHTML = '';
    }

    if (overridePath) {
        srcMenu.querySelectorAll('button').forEach(btn => btn.classList.remove('active-src'));
    }

    spawnPlayer(panelIndex, url);
}

setLayout(2);
