<style>

#multiGrid {
    display: grid;
    gap: 4px;
    padding: 0 8px 8px;
    height: calc(100vh - 120px);
}
.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-5 {
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
}
.grid-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

.grid-3 .stream-panel:nth-child(3) {
    grid-column: 1 / -1;
}
.grid-5 .stream-panel:nth-child(1) { grid-column: 1 / 3; }
.grid-5 .stream-panel:nth-child(2) { grid-column: 3 / 5; }
.grid-5 .stream-panel:nth-child(3) { grid-column: 5 / 7; }
.grid-5 .stream-panel:nth-child(4) { grid-column: 2 / 4; }
.grid-5 .stream-panel:nth-child(5) { grid-column: 4 / 6; }

    .stream-panel {
        position: relative;
        background: #111;
        border: 1px solid rgba(255,192,203,0.15);
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .panel-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        background: #1a1a1a;
        border-bottom: 1px solid rgba(255,192,203,0.1);
        flex-shrink: 0;
        flex-wrap: wrap;
    }
    .stream-select {
        flex: 1;
        min-width: 120px;
        background: #2a2a2a;

        border: 1px solid rgba(255,192,203,0.3);
        border-radius: 4px;
        padding: 3px 6px;
        font-size: 11px;
    }
    .stream-select optgroup {
        color: pink;
        font-weight: bold;
        background: #1a1a1a;
    }
    .stream-select option {
        color: white;
        background: #2a2a2a;
        font-weight: normal;
    }
    .load-btn {
        background: rgba(255,192,203,0.15);
        border: 1px solid rgba(255,192,203,0.4);
        color: pink;
        padding: 3px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        font-weight: bold;
        white-space: nowrap;
    }
    .load-btn:hover { background: rgba(255,192,203,0.3); }

    .panel-player { flex: 1; position: relative; }
    .panel-player > div { width: 100% !important; height: 100% !important; }

    .panel-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: rgba(255,192,203,0.4);

        gap: 8px;
    }
    .panel-placeholder svg { opacity: 0.3; }
    .panel-placeholder p { font-size: 13px; margin: 0; }

<div id="layoutSelector">
    <span>Streams:</span>
    <button class="layout-btn active" onclick="setLayout(2)">2</button>
    <button class="layout-btn" onclick="setLayout(3)">3</button>
    <button class="layout-btn" onclick="setLayout(4)">4</button>

<div id="multiGrid" class="grid-2"></div>

<script src="js/bootstrap.bundle.min.js"></script>
<script>
const STREAMS = [
    // ── Soccer ──
    { label: 'Slovenia vs Cyprus', sport: 'soccer', subdomain: '601', path: 'cyrus.m3u8', txt: 'domainsz29.txt' },
    { label: 'Sweden vs Greece', sport: 'soccer', subdomain: 'daffodil', path: 'fubo.m3u8', txt: 'domainsz29.txt' },
    { label: 'Andorra vs Liechtenstein', sport: 'soccer', subdomain: 'daffodil', path: 'fsp.m3u8', txt: 'domainsz29.txt' },
    { label: 'Spain vs Iraq', sport: 'soccer', subdomain: 'daffodil', path: 'byu.m3u8', txt: 'domainsz29.txt' },
    { label: 'France vs Cote D\'Ivoire', sport: 'soccer', subdomain: 'daffodil', path: 'tnt.m3u8', txt: 'domainsz29.txt' },
    { label: 'Czech Republic vs Guatemala', sport: 'soccer', subdomain: 'daffodil', path: 'sportv.m3u8', txt: 'domainsz29.txt' },
    { label: 'Mexico vs Serbia', sport: 'soccer', subdomain: '601', path: 'fana2.m3u8', txt: 'domainsz29.txt' },
    // ── MLB ──
    { label: 'San Diego Padres vs Philadelphia Phillies', sport: 'mlb', subdomain: '601', path: 'mlb.m3u8', txt: 'domainsz29.txt' },
    { label: 'Baltimore Orioles vs Boston Red Sox', sport: 'mlb', subdomain: '601', path: 'mlb2.m3u8', txt: 'domainsz29.txt' },
    { label: 'Cleveland Guardians vs New York Yankees', sport: 'mlb', hardcoded: 'https://601.formaturamaxi.com.br/mlb3.m3u8' },
    { label: 'San Francisco Giants vs Milwaukee Brewers', sport: 'mlb', subdomain: '601', path: 'mlb4.m3u8', txt: 'domainsz29.txt' },
    { label: 'Toronto Blue Jays vs Atlanta Braves', sport: 'mlb', hardcoded: 'https://601.formaturamaxi.com.br/mlb5.m3u8' },
    { label: 'Kansas City Royals vs Minnesota Twins', sport: 'mlb', hardcoded: 'https://601.formaturamaxi.com.br/mlb6.m3u8' },
    { label: 'Athletics vs Chicago Cubs', sport: 'mlb', hardcoded: 'https://601.formaturamaxi.com.br/mlb7.m3u8' },
    { label: 'Pittsburgh Pirates vs Houston Astros', sport: 'mlb', hardcoded: 'https://601.formaturamaxi.com.br/mlb8.m3u8' },
    { label: 'Los Angeles Dodgers vs Arizona Diamondbacks', sport: 'mlb', hardcoded: 'https://601.formaturamaxi.com.br/mlb9.m3u8' },
    // ── NBA ──
    { label: 'New York Knicks vs San Antonio Spurs', sport: 'nba', subdomain: 'daffodil', path: 'nba.m3u8', txt: 'domainsz29.txt' },
    // ── NHL ──
    { label: 'Vegas Golden Knights vs Carolina Hurricanes', sport: 'nhl', subdomain: '601', path: 'nhl.m3u8', txt: 'domainsz29.txt' },
    // ── Fighting ──
    { label: 'WWE Smackdown', sport: 'fighting', subdomain: 'daffodil', path: 'wwe.m3u8', txt: 'domainsz29.txt' },
    // ── Motorsports ──
    { label: 'Isle of Man TT - Coverage (CANCELLED)', sport: 'motorsports', subdomain: '601', path: 'tt.m3u8', txt: 'domainsz29.txt' },
    { label: 'TEST', sport: 'motorsports', subdomain: '700', path: 'ppv2.m3u8', txt: 'domainsz29.txt' },
];

const SPORT_LABELS = {
    soccer: '⚽ Soccer', mlb: '⚾ MLB', nba: '🏀 NBA',
    nhl: '🏒 NHL', fighting: '🥊 Fighting', motorsports: '🏎️ Motorsports'
};

let domains = {};
let players = {};

const uniqueTxts = [...new Set(STREAMS.filter(s => s.txt).map(s => s.txt))];
Promise.all(uniqueTxts.map(txt =>
    fetch(txt).then(r => r.text()).then(data => {
        domains[txt] = data.trim().split('\n').filter(d => d.trim());
    }).catch(() => { domains[txt] = []; })
));

function getStreamUrl(stream) {
    if (stream.hardcoded) return stream.hardcoded;
    const domainList = domains[stream.txt] || [];
    if (domainList.length === 0) {
        return `https://${stream.subdomain}.shadow-ran.online/${stream.path}`;
    }
    const randomDomain = domainList[Math.floor(Math.random() * domainList.length)];
    return `https://${stream.subdomain}.${randomDomain}/${stream.path}`;
}

function buildStreamOptions() {
    const groups = {};
    STREAMS.forEach((s, i) => {
        if (!groups[s.sport]) groups[s.sport] = [];
        groups[s.sport].push({ label: s.label, index: i });
    });
    const sportOrder = ['soccer','mlb','nba','nhl','fighting','motorsports'];
    let html = '<option value="">— Select a stream —</option>';
    sportOrder.forEach(sport => {
        if (!groups[sport]) return;
        const label = SPORT_LABELS[sport] || sport.toUpperCase();
        html += `<optgroup label="${label}">`;
        groups[sport].forEach(s => {
            html += `<option value="${s.index}">${s.label}</option>`;
        });
        html += '</optgroup>';
    });
    return html;
}

function setLayout(count) {
    Object.values(players).forEach(p => { try { p.destroy(); } catch(e){} });
    players = {};
    const grid = document.getElementById('multiGrid');
    grid.className = `grid-${count}`;
    grid.innerHTML = '';
    document.querySelectorAll('.layout-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() == count);
    });
    for (let i = 0; i < count; i++) {
        const panel = document.createElement('div');
        panel.className = 'stream-panel';
        panel.innerHTML = `
            <div class="panel-toolbar">
                <select class="stream-select" id="select-${i}">
                    ${buildStreamOptions()}
                </select>
                <button class="load-btn" onclick="loadStream(${i})">Load</button>
            </div>
            <div class="panel-player" id="player-${i}">
                <div class="panel-placeholder">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="pink" stroke-width="1.5">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <p>Select a stream and press Load</p>
                </div>
            </div>`;
        grid.appendChild(panel);
    }
}

function loadStream(panelIndex) {
    const select = document.getElementById(`select-${panelIndex}`);
    const streamIndex = select.value;
    if (streamIndex === '') return;
    const stream = STREAMS[streamIndex];
    const url = getStreamUrl(stream);
    const container = document.getElementById(`player-${panelIndex}`);
    if (players[panelIndex]) {
        try { players[panelIndex].destroy(); } catch(e) {}
        delete players[panelIndex];
    }
    container.innerHTML = '';
    const playerDiv = document.createElement('div');
    playerDiv.id = `clappr-${panelIndex}`;
    playerDiv.style.width = '100%';
    playerDiv.style.height = '100%';
    container.appendChild(playerDiv);
    players[panelIndex] = new Clappr.Player({
        source: url,
        parentId: `#clappr-${panelIndex}`,
        height: '100%',
        width: '100%',
        autoPlay: true,
        mute: panelIndex > 0,
    });
}

setLayout(2);
    setLayout(2);
</script>

            (e.ctrlKey && e.shiftKey && e.key === 'J')) {
            e.preventDefault();
        }
    });
</script>

<script src="js/bootstrap.bundle.min.js"></script>
</body>
