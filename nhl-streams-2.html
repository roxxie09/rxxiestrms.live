<script>
var clapprPlayer;
var currentChat = 'yt';
var domains = [];
var subdomain = 'daffodil'  // Edit this per HTML file

// Load domains from txt file
fetch('domainsx.txt')
  .then(response => response.text())
  .then(data => {
    domains = data.trim().split('\n').filter(d => d.trim());
    // Auto-load initial stream after domains load
    setTimeout(() => showPlayer('clappr', getRandomStream('nhl2.m3u8')), 500);
  })
  .catch(() => {
    console.error('Failed to load domainsx.txt');
  });

function getRandomStream(streamPath, subdomain = 'daffodil') {
  if (domains.length === 0) {
    return `https://${subdomain}.shadow-ran.online/${streamPath}`; // Fallback
  }
  const randomDomain = domains[Math.floor(Math.random() * domains.length)];
  return `https://${subdomain}.${randomDomain}/${streamPath}`;
}

function showPlayer(playerType, stream) {
  if (playerType === "clappr") {
    if (clapprPlayer) {
      clapprPlayer.destroy();
    }
    clapprPlayer = new Clappr.Player({
      source: stream,
      parentId: "#playerContainer",
      height: '100%',
      width: '100%',
      autoPlay: true,
    });
  }
}

window.onload = function() {
        var toggleBtn = document.getElementById('toggleChat');
        var chatContent = document.getElementById('chatContent');

        if (toggleBtn) {
            toggleBtn.onclick = function() {
                if (currentChat === 'yt') {
                    chatContent.innerHTML = '';

                    var script = document.createElement('script');
                    script.id = 'cid0020000123456789012';
                    script.async = true;
                    script.src = 'https://st.chatango.com/js/gz/emb.js';

                    var config = {
                        handle: 'roxiestreams',
                        arch: 'js',
                        styles: {
                            a: '1a1a1a',
                            b: 100,
                            c: 'ffffff',
                            d: 'ffffff',
                            e: '1a1a1a',
                            f: '000000',
                            g: 'ffffff',
                            h: '000000',
                            i: 100,
                            j: 'ffffff',
                            k: 'e573b5',
                            l: '1a1a1a',
                            m: 'ffffff',
                            n: 'ffffff',
                            q: '1a1a1a',
                            r: 100,
                            t: 0,
                            v: 0,
                            w: 0
                        }
                    };

                    script.innerHTML = JSON.stringify(config);
                    chatContent.appendChild(script);
                    toggleBtn.innerText = 'Switch to YouTube';
                    currentChat = 'chatango';
                } else {
                    chatContent.innerHTML = '<iframe src="https://www.youtube.com/live_chat?v=mpwfjhmyEzw&amp;embed_domain=roxiestreams.info"></iframe>';
                    toggleBtn.innerText = 'Switch to Chatango';
                    currentChat = 'yt';
                }
            };
        }
    };
</script>
