<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roxiestreams - Watch Live Sports, F1, UFC, NFL, TV</title>
    <meta name="description" content="Free PPV UFC, TV, NBA, NFL, and F1 streams">
    <meta name="keywords" content="Roxiestreams, ppv, boxing, dazn, f1, ufc, nba, for, stream, online, free, mrgamingstreams, f1, tv, nfl">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: white;
        }
        .navbar-brand {
            color: pink !important;
            font-size: 1.3rem;
            text-decoration: none;
            margin-top: -3px;
            font-family: 'Kanit', sans-serif;
            font-weight: bold;
        }
        .navbar-brand:hover {
            text-decoration: underline;
        }
        .fullplayer {
            display: flex;
            justify-content: center;
            position: relative;
            height: 80vh;
            margin-top: 50px;
        }
        #playerContainer {
            width: 70%;
            height: 100%;
            background: #000;
        }
        .embedchat {
            width: 30%;
            height: 100%;
            display: flex;
            flex-direction: column;
            margin-left: 10px;
            border: 1px solid rgba(255, 192, 203, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }
        .chat-header {
            padding: 8px;
            background: #1a1a1a;
            border-bottom: 1px solid rgba(255, 192, 203, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-toggle-btn {
            background: rgba(255, 192, 203, 0.1);
            border: 1px solid rgba(255, 192, 203, 0.3);
            color: pink;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }
        .chat-toggle-btn:hover {
            background: rgba(255, 192, 203, 0.2);
        }
        #chatContent {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        #chatContent iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .streamchanger {
            position: absolute;
            top: -40px;
            left: 10px;
            display: flex;
            gap: 10px;
        }
        .streambutton {
            background: pink;
            color: black;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-black">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">RoxieStreams</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#">March Madness</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Soccer</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">MLB</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">NBA</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">NFL</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">NHL</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Fighting</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Motorsports</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid pt-2">
        <div class="fullplayer">
            <div id="playerContainer"></div>
            <div class="streamchanger">
                <button class="streambutton" onclick="showPlayer('https://602.underupturnip.net/mlb.m3u8')">Stream 1</button>
            </div>
            <div class="embedchat">
                <div class="chat-header">
                    <span style="font-size: 10px; color: pink; font-weight: bold;">LIVE CHAT</span>
                    <button class="chat-toggle-btn" id="toggleChat">Switch to Chatango</button>
                </div>
                <div id="chatContent">
                    <iframe src="https://www.youtube.com/live_chat?v=mpwfjhmyEzw&amp;embed_domain=roxiestreams.info"></iframe>
                </div>
            </div>
        </div>
    </div>

    <footer class="container-fluid d-flex justify-content-between align-items-center py-3 border-top mt-5 bg-black">
        <p class="mb-0 text-secondary">Roxiestreams © 2024</p>
        <ul class="nav">
            <li class="nav-item"><a href="#" class="nav-link px-2 text-secondary">Discord</a></li>
        </ul>
    </footer>

    <script>
        var clapprPlayer;
        function showPlayer(stream) {
            if (clapprPlayer) clapprPlayer.destroy();
            clapprPlayer = new Clappr.Player({
                source: stream,
                parentId: "#playerContainer",
                height: '100%',
                width: '100%',
                autoPlay: true,
                mute: true
            });
        }
        window.onload = function() {
            showPlayer('https://602.underupturnip.net/mlb.m3u8');
        };

        // Chat Toggle Logic
        var currentChat = 'yt';
        var toggleBtn = document.getElementById('toggleChat');
        var chatContent = document.getElementById('chatContent');

        toggleBtn.onclick = function() {
            if (currentChat === 'yt') {
                chatContent.innerHTML = '';
                var script = document.createElement('script');
                script.id = 'cid0020000123456789012';
                script.async = true;
                script.src = '//st.chatango.com/js/gz/emb.js';
                script.style.width = '100%';
                script.style.height = '100%';
                var config = {
                    handle: 'roxiestreams',
                    arch: 'js',
                    styles: {
                        a: '1a1a1a', b: 100, c: 'fce4f7', d: 'fce4f7', e: '1a1a1a', 
                        g: 'fce4f7', h: 'fce4f7', i: 100, j: 'fce4f7', k: 'e573b5', 
                        l: '1a1a1a', m: 'fce4f7', n: 'fce4f7', q: '1a1a1a', r: 100, 
                        t: 0, v: 0, w: 0
                    }
                };
                script.innerHTML = JSON.stringify(config);
                chatContent.appendChild(script);
                toggleBtn.innerText = 'Switch to YouTube';
                currentChat = 'chatango';
            } else {
                chatContent.innerHTML = '<iframe src="https://www.youtube.com/live_chat?v=mpwfjhmyEzw&amp;embed_domain=roxiestreams.info"></iframe>';
                toggleBtn.innerText = 'Switch to Chatango';
                currentChat = 'yt';
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
