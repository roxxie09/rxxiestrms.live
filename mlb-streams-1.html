<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roxiestreams - Watch Live Sports, F1, UFC, NFL, TV</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
      /* Inline styles for immediate layout */
      body {
        margin: 0;
        padding: 2rem 1rem;
        background-color: #000;
        color: #fce4f7;
        font-family: "SF Pro", ui-sans-serif, system-ui, sans-serif;
      }
      .custom-container {
        margin: 0 auto;
        width: 100%;
        max-width: 650px;
        background-color: #1a1a1a;
        border: 3px solid #fbb6ce;
        border-radius: 18px;
        box-shadow: 0 4px 16px #e573b5;
        overflow: hidden;
      }
      .traffic-lights {
        display: flex;
        gap: 6px;
        padding: 12px;
        border-bottom: 1px solid rgba(251, 182, 206, 0.2);
      }
      .traffic-light {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .traffic-light-red { background-color: #dc143c; }
      .traffic-light-orange { background-color: #ffa500; }
      .traffic-light-green { background-color: #32cd32; }
      
      nav {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(251, 182, 206, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand {
        color: #fbb6ce;
        font-weight: bold;
        font-size: 1.25rem;
        text-decoration: none;
        font-family: 'Kanit', sans-serif;
      }
      .main-content {
        padding: 16px;
      }
      .player-area {
        background: #000;
        border-radius: 12px;
        border: 1px solid rgba(251, 182, 206, 0.2);
        aspect-ratio: 16/9;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .chat-area {
        background: rgba(0,0,0,0.2);
        border-radius: 12px;
        border: 1px solid rgba(251, 182, 206, 0.2);
        overflow: hidden;
        min-height: 400px;
      }
      .chat-header {
        padding: 12px;
        border-bottom: 1px solid rgba(251, 182, 206, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(229, 115, 181, 0.05);
      }
      .chat-title {
        font-size: 0.75rem;
        font-weight: bold;
        color: #fbb6ce;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .chat-toggle-btn {
        background: rgba(229, 115, 181, 0.1);
        border: 1px solid rgba(251, 182, 206, 0.2);
        color: #fbb6ce;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
      }
      .chat-toggle-btn:hover {
        background: rgba(229, 115, 181, 0.3);
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      #chatContainer {
        height: 400px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="custom-container">
      <div class="traffic-lights">
        <div class="traffic-light traffic-light-red"></div>
        <div class="traffic-light traffic-light-orange"></div>
        <div class="traffic-light traffic-light-green"></div>
      </div>
      
      <nav>
        <a href="#" class="brand">RoxieStreams</a>
      </nav>
      
      <div class="main-content">
        <div class="player-area" id="playerContainer"></div>
        
        <div class="chat-area">
          <div class="chat-header">
            <div class="chat-title">Live Chat</div>
            <button class="chat-toggle-btn" id="toggleChat">Switch to Chatango</button>
          </div>
          <div id="chatContainer">
            <!-- YouTube Chat by default -->
            <iframe id="ytChat" src="https://www.youtube.com/live_chat?v=mpwfjhmyEzw&amp;embed_domain=roxiestreams.info"></iframe>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Clappr Player
      var player = new Clappr.Player({
        source: "https://602.underupturnip.net/mlb.m3u8",
        parentId: "#playerContainer",
        height: '100%',
        width: '100%',
        autoPlay: true,
        mute: true
      });

      // Chat Toggle Logic
      var currentChat = 'yt';
      var toggleBtn = document.getElementById('toggleChat');
      var chatContainer = document.getElementById('chatContainer');

      toggleBtn.onclick = function() {
        if (currentChat === 'yt') {
          // Switch to Chatango
          chatContainer.innerHTML = '';
          var script = document.createElement('script');
          script.id = 'cid0020000123456789012';
          script.async = true;
          script.src = '//st.chatango.com/js/gz/emb.js';
          script.style.width = '100%';
          script.style.height = '100%';
          
          var config = {
            handle: 'roxiestreams',
            arch: 'js',
            styles: {
              a: '1a1a1a', b: 100, c: 'fce4f7', d: 'fce4f7', e: '1a1a1a', 
              g: 'fce4f7', h: 'fce4f7', i: 100, j: 'fce4f7', k: 'e573b5', 
              l: '1a1a1a', m: 'fce4f7', n: 'fce4f7', q: '1a1a1a', r: 100, 
              t: 0, v: 0, w: 0
            }
          };
          
          script.innerHTML = JSON.stringify(config);
          chatContainer.appendChild(script);
          
          toggleBtn.innerText = 'Switch to YouTube';
          currentChat = 'chatango';
        } else {
          // Switch to YouTube
          chatContainer.innerHTML = '<iframe id="ytChat" src="https://www.youtube.com/live_chat?v=mpwfjhmyEzw&amp;embed_domain=roxiestreams.info"></iframe>';
          toggleBtn.innerText = 'Switch to Chatango';
          currentChat = 'yt';
        }
      };
    </script>
    
    <!-- Keep Vite entry point for build system compatibility -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
